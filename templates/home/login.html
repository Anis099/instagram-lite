{% extends 'home/base.html' %}

{% block content %}

<div style="max-width: 400px; margin: 0 auto; background: #fff; border: 1px solid #dbdbdb; border-radius: 8px; padding: 32px;">

    <h2 style="text-align: center; margin-bottom: 24px; font-size: 28px;">Instagram Lite</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required
            style="width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #dbdbdb; border-radius: 4px; font-size: 14px;">

        <input type="password" name="password" placeholder="Password" required
            style="width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #dbdbdb; border-radius: 4px; font-size: 14px;">

        <button type="submit"
            style="width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer;">
            Log In
        </button>
    </form>

    <p style="text-align: center; margin-top: 16px; font-size: 14px;">
        Don't have an account? <a href="/register/" style="color: #0095f6;">Sign up</a>
    </p>

</div>

{% endblock %}
