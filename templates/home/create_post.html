{% extends 'home/base.html' %}

{% block content %}

<div style="max-width: 500px; margin: 0 auto; background: #fff; border: 1px solid #dbdbdb; border-radius: 8px; padding: 32px;">

    <h2 style="margin-bottom: 24px; font-size: 20px;">Create New Post</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold;">Choose Image</label>
            <input type="file" name="image" accept="image/*" required
                style="width: 100%; font-size: 14px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold;">Caption</label>
            <textarea name="caption" rows="3" placeholder="Write a caption..."
                style="width: 100%; padding: 10px; border: 1px solid #dbdbdb; border-radius: 4px; font-size: 14px; resize: none;"></textarea>
        </div>

        <button type="submit"
            style="width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer;">
            Share Post
        </button>

    </form>

</div>

{% endblock %}
